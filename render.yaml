# Deployment Configuration for Render

## Backend Server Configuration

name: coinbase-clone-api
runtime: node
buildCommand: npm --prefix server install
startCommand: npm --prefix server start

## Environment Variables (Set these in Render dashboard)

PORT=5000
MONGODB_URI=mongodb+srv://username:password@cluster.mongodb.net/coinbase-clone
JWT_SECRET=7a8068556dde2696942987bdfab59685b2d65a92a8bd01ddaea4b806bf8ea7a03e5339b27741055c3f716977c1b659d399447dccee31576f56372a11f86d5b96
NODE_ENV=production
CLIENT_URL=https://your-frontend-url.vercel.app

## To Deploy:

1. Push code to GitHub
2. Go to Render.com > New > Web Service
3. Select GitHub repository
4. Configure as shown above
5. Set environment variables in dashboard
6. Deploy

## Post-deployment:

```bash
curl https://your-api.onrender.com/api/health
curl -X POST https://your-api.onrender.com/api/seed
```
